    <script>
      (() => {
        const key = "qqqzj-crane-theme";
        const modes = ["pneuma", "ousia", "auto"];
        let preference = "auto";
        try {
          const stored = window.localStorage.getItem(key);
          preference = modes.includes(stored) ? stored : "auto";
        } catch {
          preference = "auto";
        }

        const prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
        const state = preference === "auto" ? (prefersDark ? "ousia" : "pneuma") : preference;
        document.documentElement.dataset.themePreference = preference;
        document.documentElement.dataset.themeState = state;
        document.documentElement.style.colorScheme = state === "ousia" ? "dark" : "light";
      })();
    </script>

    <script defer src="theme.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        let hadController = Boolean(navigator.serviceWorker.controller);
        let reloadingForUpdate = false;
        const activateWaitingServiceWorker = (worker) => {
          if (!worker || !navigator.serviceWorker.controller) return;
          worker.postMessage({ type: "SKIP_WAITING" });
        };
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!hadController) {
            hadController = true;
            return;
          }
          if (reloadingForUpdate) return;
          reloadingForUpdate = true;
          window.location.reload();
        });
        window.addEventListener("load", async () => {
          try {
            const registration = await navigator.serviceWorker.register("/service-worker.js", {
              updateViaCache: "none",
            });
            activateWaitingServiceWorker(registration.waiting);
            registration.addEventListener("updatefound", () => {
              const worker = registration.installing;
              if (!worker) return;
              worker.addEventListener("statechange", () => {
                if (worker.state === "installed") {
                  activateWaitingServiceWorker(worker);
                }
              });
            });
            await registration.update();
          } catch {}
        });
      }
    </script>
