      if ("serviceWorker" in navigator) {
        let hadController = Boolean(navigator.serviceWorker.controller);
        let reloadingForUpdate = false;
        const activateWaitingServiceWorker = (worker) => {
          if (!worker || !navigator.serviceWorker.controller) return;
          worker.postMessage({ type: "SKIP_WAITING" });
        };
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!hadController) {
            hadController = true;
            return;
          }
          if (reloadingForUpdate) return;
          reloadingForUpdate = true;
          window.location.reload();
        });
        window.addEventListener("load", async () => {
          try {
            const registration = await navigator.serviceWorker.register("/service-worker.js", {
              updateViaCache: "none",
            });
            activateWaitingServiceWorker(registration.waiting);
            registration.addEventListener("updatefound", () => {
              const worker = registration.installing;
              if (!worker) return;
              worker.addEventListener("statechange", () => {
                if (worker.state === "installed") {
                  activateWaitingServiceWorker(worker);
                }
              });
            });
            await registration.update();
          } catch {}
        });

      window.CraneComments?.render(document.querySelector("#post-comments"), {
        slug: "2026-04-28-恍若昨日-恍若隔世",
        title: "恍若昨日 恍若隔世",
        commentTerm: "post:2026-04-28-恍若昨日-恍若隔世",
      });

      const readingProgress = document.querySelector("#reading-progress");
      function updateReadingProgress() {
        const max = document.documentElement.scrollHeight - window.innerHeight;
        const progress = max <= 0 ? 1 : Math.min(1, Math.max(0, window.scrollY / max));
        readingProgress.style.transform = `scaleX(${progress})`;
      }
      window.addEventListener("scroll", updateReadingProgress, { passive: true });
      window.addEventListener("resize", updateReadingProgress);
      updateReadingProgress();

      document.querySelector("#post-jump-top")?.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      document.querySelector("#post-jump-comments")?.addEventListener("click", () => {
        window.CraneComments?.focus(document.querySelector("#post-comments"));
      });

      const toc = document.querySelector(".post-toc");
      const tocLinks = toc ? [...toc.querySelectorAll("a[data-heading-id]")] : [];
      const tocSections = tocLinks
        .map((link) => findHeadingById(document, link.dataset.headingId))
        .filter(Boolean);
      let tocClickLockUntil = 0;

      toc?.addEventListener("click", (event) => {
        const link = event.target.closest("a[data-heading-id]");
        if (link) {
          const heading = findHeadingById(document, link.dataset.headingId);
          if (!heading) return;
          event.preventDefault();
          scrollToHeading(heading);
          activateTocLink(heading.id);
          tocClickLockUntil = Date.now() + 900;
          if (heading.id) history.pushState(null, "", `#${heading.id}`);
          toc.classList.remove("is-open");
          return;
        }
        toc.classList.toggle("is-open");
      });

      document.addEventListener("click", (event) => {
        if (!toc || toc.contains(event.target)) return;
        toc.classList.remove("is-open");
      });

      function activateTocLink(id) {
        tocLinks.forEach((link) => {
          const active = link.dataset.headingId === id;
          link.classList.toggle("is-active", active);
          if (active) {
            link.setAttribute("aria-current", "location");
          } else {
            link.removeAttribute("aria-current");
          }
        });
      }

      function findHeadingById(root, id) {
        if (!root || !id) return null;
        const escapedId = window.CSS?.escape ? window.CSS.escape(id) : id.replaceAll('"', '\"');
        return root.querySelector(`#${escapedId}`);
      }

      function scrollToHeading(heading) {
        const topbarHeight = document.querySelector(".topbar")?.getBoundingClientRect().height || 0;
        const offset = topbarHeight + 8;
        const top = heading.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
      }

      if (tocSections.length) {
        activateTocLink(tocSections[0].id);

        if ("IntersectionObserver" in window) {
          const visibleSections = new Map();
          const observer = new IntersectionObserver((entries) => {
            if (Date.now() < tocClickLockUntil) return;

            entries.forEach((entry) => {
              visibleSections.set(entry.target.id, entry.isIntersecting);
            });

            const current = tocSections.find((section) => visibleSections.get(section.id))
              || [...tocSections].reverse().find((section) => section.getBoundingClientRect().top <= 140)
              || tocSections[0];

            activateTocLink(current.id);
          }, {
            rootMargin: "-18% 0px -68% 0px",
            threshold: [0, 1],
          });

          tocSections.forEach((section) => observer.observe(section));
        }
      }
    </script>
